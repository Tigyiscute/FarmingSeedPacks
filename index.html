<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Content</title>
    <style>
        /* Remove default margins and padding */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents double scrollbars */
            background-color: #000; /* Dark background while loading */
        }

        /* Make the iframe take up the entire viewport */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <iframe src="https://gag.gg" title="Embedded Content">
        <p>Your browser does not support iframes. Please visit <a href="https://gag.gg">gag.gg</a> directly.</p>
    </iframe>

</body>
</html>
